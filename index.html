<!DOCTYPE html>
<html lang="da" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIT Arabisk Alfabet</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f7f3e8, #e8f1ff);
      color: #1f2937;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 28px 16px 18px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 16px;
      color: #4b5563;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }

    .grid {
      direction: rtl;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
      gap: 12px;
      padding-bottom: 28px;
    }

    .letter-button {
      background: white;
      border: 2px solid transparent;
      border-radius: 20px;
      padding: 16px 8px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.07);
      transition: 0.15s ease;
    }

    .letter-button:hover {
      transform: translateY(-2px);
    }

    .letter-button.active {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .arabic-letter {
      font-size: 42px;
      direction: rtl;
    }

    .latin-name {
      font-size: 13px;
      color: #4b5563;
      margin-top: 4px;
    }

    footer {
      text-align: center;
      color: #6b7280;
      font-size: 13px;
      padding: 20px 12px 32px;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 28px;
      }

      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>DIT Arabisk Alfabet</h1>
    <div class="subtitle">Tryk på et bogstav og hør lyden</div>
  </header>

  <main class="app">
    <section id="alphabetGrid" class="grid"></section>
  </main>

  <footer>
    Udviklet af Roskilde Islamisk Menighed
  </footer>

  <script>
    const letters = [
      { arabic: "ا", name: "Alif", sound: "001-alif.mp3" },
      { arabic: "ب", name: "Ba", sound: "002-ba.mp3" },
      { arabic: "ت", name: "Ta", sound: "003-taa.mp3" },
      { arabic: "ث", name: "Tha", sound: "004-tha.mp3" },
      { arabic: "ج", name: "Jim", sound: "005-jeem.mp3" },
      { arabic: "ح", name: "Ha", sound: "006-haa.mp3" },
      { arabic: "خ", name: "Kha", sound: "007-khaa.mp3" },
      { arabic: "د", name: "Dal", sound: "008-dal.mp3" },
      { arabic: "ذ", name: "Dhal", sound: "009-dhal.mp3" },
      { arabic: "ر", name: "Ra", sound: "010-raa.mp3" },
      { arabic: "ز", name: "Zay", sound: "011-jaa.mp3" },
      { arabic: "س", name: "Sin", sound: "012-seen.mp3" },
      { arabic: "ش", name: "Shin", sound: "013-sheen.mp3" },
      { arabic: "ص", name: "Sad", sound: "014-saad.mp3" },
      { arabic: "ض", name: "Dad", sound: "015-dhaad.mp3" },
      { arabic: "ط", name: "Ta", sound: "016-toa.mp3" },
      { arabic: "ظ", name: "Dha", sound: "017-dhaa.mp3" },
      { arabic: "ع", name: "Ayn", sound: "018-ain.mp3" },
      { arabic: "غ", name: "Ghayn", sound: "019-ghain.mp3" },
      { arabic: "ف", name: "Fa", sound: "020-faa.mp3" },
      { arabic: "ق", name: "Qaf", sound: "021-qaaf.mp3" },
      { arabic: "ك", name: "Kaf", sound: "022-kaaf.mp3" },
      { arabic: "ل", name: "Lam", sound: "023-laam.mp3" },
      { arabic: "م", name: "Mim", sound: "024-meem.mp3" },
      { arabic: "ن", name: "Nun", sound: "025-noon.mp3" },
      { arabic: "و", name: "Waw", sound: "026-waw.mp3" },
      { arabic: "ه", name: "Ha", sound: "027-ha.mp3" },
      { arabic: "لا", name: "lam Alif", sound: "028-lamalif.mp3" },
      { arabic: "ي", name: "Ya", sound: "029-yaa.mp3" }
    ];

    let selectedIndex = 0;
    const grid = document.getElementById("alphabetGrid");

    function renderLetters() {
      grid.innerHTML = "";

      letters.forEach((letter, index) => {
        const button = document.createElement("button");
        button.className = "letter-button" + (index === selectedIndex ? " active" : "");
        button.innerHTML = `
          <div class="arabic-letter">${letter.arabic}</div>
          <div class="latin-name">${letter.name}</div>
        `;
        button.onclick = () => selectLetter(index);
        grid.appendChild(button);
      });
    }

    function selectLetter(index) {
      selectedIndex = index;
      renderLetters();
      playSelectedSound();
    }

    function playSelectedSound() {
      const letter = letters[selectedIndex];
      const audio = new Audio(`sounds/${letter.sound}`);

      audio.play().catch(() => {
        speakFallback(letter.name);
      });
    }

    function speakFallback(text) {
      if ("speechSynthesis" in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-US";
        utterance.rate = 0.8;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      } else {
        alert("Lydfil mangler. Tilføj lydfiler i mappen 'sounds'.");
      }
    }

    renderLetters();
  </script>
</body>
</html>
